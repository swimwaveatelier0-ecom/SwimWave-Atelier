<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart | SwimWave Atelier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="subpage-shell">
      <section class="subpage-hero container">
        <p class="eyebrow">Cart</p>
        <h1>Your selected pieces are ready for the next step.</h1>
        <p class="lead">Review your current order and continue to order details when ready.</p>
      </section>

      <section class="subpage-panel container">
        <div id="cartPageContent" class="cart-page-content"></div>
        <div class="subpage-actions">
          <a class="secondary-link" href="index.html#collection">Continue Shopping</a>
          <button class="primary" type="button" onclick="proceedToPayment()">Checkout Selected Items</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
